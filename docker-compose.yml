version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: autopost
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autopost_sync"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
