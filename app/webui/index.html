<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Autopost Sync Control Panel</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="shortcut icon" href="/static/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img class="brand-logo" src="/static/logo.png" alt="AutoPost Sync logo">
      <h1>AutoPost Sync</h1>
    </div>
    <div class="tabs">
      <button class="active" data-tab="overview">Overview</button>
      <button data-tab="adapters">Adapters</button>
      <button data-tab="routes">Routes</button>
      <button data-tab="jobs">Jobs</button>
      <button data-tab="links">Post status</button>
      <button data-tab="diagnostics">Diagnostics</button>
      <a class="faq-link" href="/faq.html" target="_blank">FAQ / Где что взять</a>
    </div>

    <section id="tab-overview" class="tab active">
      <div id="overview"></div>
    </section>

    <section id="tab-adapters" class="tab">
      <div class="row" style="margin-bottom:16px">
        <div class="card">
          <h3>Создать инстанс адаптера</h3>
          <div class="row">
            <label>
              <span class="label">Тип адаптера</span>
              <select id="newAdapterKey"></select>
            </label>
            <label>
              <span class="label">Название</span>
              <input id="newDisplayName" placeholder="Основной Telegram">
            </label>
          </div>
          <div class="inline">
            <button class="btn" id="createInstanceBtn" type="button">Создать</button>
            <span class="muted">Внутренний ID будет создан автоматически. Изменения подключения применяются после перезапуска приложения.</span>
          </div>
        </div>
      </div>
      <div id="adapterInstances"></div>
    </section>

    <section id="tab-routes" class="tab">
      <div class="card">
        <h3>Новый маршрут</h3>
        <form id="routeForm">
          <div class="row">
            <label>
              <span class="label">Откуда</span>
              <select name="source_adapter_id" required></select>
            </label>
            <label>
              <span class="label-row">
                <span class="label">Источник: chat id / username / ссылка</span>
                <button class="help-icon" type="button" data-help-id="route.source_chat" title="Открыть справку">?</button>
              </span>
              <input name="source_chat_id" required>
              <span class="help">Можно указать числовой chat id, @username или ссылку вида https://t.me/username</span>
            </label>
            <label>
              <span class="label">Куда</span>
              <select name="target_adapter_id" required></select>
            </label>
            <label>
              <span class="label-row">
                <span class="label">Назначение: chat id / username / ссылка</span>
                <button class="help-icon" type="button" data-help-id="route.target_chat" title="Открыть справку">?</button>
              </span>
              <input name="target_chat_id" required>
              <span class="help">Можно указать числовой chat id, @username или ссылку вида https://t.me/username</span>
            </label>
          </div>
          <div class="inline" style="margin-top:8px">
            <button class="btn" type="submit">Создать маршрут</button>
            <span class="muted">ID маршрута будет создан автоматически.</span>
          </div>
        </form>
      </div>
      <div class="card" style="margin-top:16px">
        <div id="routes"></div>
      </div>
    </section>

    <section id="tab-jobs" class="tab">
      <div class="card">
        <div id="jobs"></div>
      </div>
    </section>

    <section id="tab-links" class="tab">
      <div class="card">
        <div id="links"></div>
      </div>
    </section>

    <section id="tab-diagnostics" class="tab">
      <div class="card">
        <div id="diagnosticsPanel"></div>
      </div>
    </section>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="helpBackdrop" class="drawer-backdrop">
    <div class="drawer">
      <div class="inline">
        <h2 id="helpTitle" style="margin:0">Справка</h2>
        <button class="btn secondary btn small drawer-close" id="helpCloseBtn" type="button">Закрыть</button>
      </div>
      <div id="helpSummary" class="muted" style="margin:8px 0 14px"></div>
      <div id="helpBody" class="md"></div>
    </div>
  </div>

  <template id="vk-legacy-ui" hidden>
    <button class="btn vk-auth-btn" type="button">Войти с VK</button>
    <button class="btn secondary vk-load-groups-btn" type="button">Загрузить админ-группы</button>
    <button class="btn secondary vk-groups-auth-btn" type="button">Legacy: токен сообщества</button>
  </template>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
