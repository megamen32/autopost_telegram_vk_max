<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AutoPost Sync</title>
  <style>
    body{font-family:system-ui,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
    .wrap{max-width:1400px;margin:0 auto;padding:20px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.tabs button{padding:10px 14px;border:0;border-radius:10px;background:#1e293b;color:#e2e8f0;cursor:pointer}.tabs button.active{background:#2563eb}
    .tab{display:none}.tab.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
    .card{background:#111827;padding:16px;border-radius:14px;border:1px solid #334155}
    h2,h3{margin:0 0 12px} h1{margin:0 0 16px}
    label{display:block;margin-bottom:10px} .label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
    input,select,textarea{width:100%;box-sizing:border-box;padding:10px;border-radius:10px;border:1px solid #475569;background:#020617;color:#e2e8f0}
    textarea{min-height:90px} .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .btn{padding:10px 14px;border:0;border-radius:10px;background:#2563eb;color:white;cursor:pointer}.btn.secondary{background:#334155}.btn.danger{background:#b91c1c}
    .muted{color:#94a3b8;font-size:13px}.mono{font-family:ui-monospace,monospace}
    table{width:100%;border-collapse:collapse} th,td{padding:8px;border-bottom:1px solid #334155;text-align:left;vertical-align:top}
    .inline{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#1e293b;font-size:12px}
    .hidden{display:none} .toast{position:fixed;right:20px;bottom:20px;background:#111827;border:1px solid #475569;padding:10px 14px;border-radius:10px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>AutoPost Sync</h1>
  <div class="tabs">
    <button class="active" data-tab="overview">Overview</button>
    <button data-tab="adapters">Adapters</button>
    <button data-tab="matrix">Matrix</button>
    <button data-tab="routes">Routes</button>
    <button data-tab="jobs">Jobs</button>
    <button data-tab="links">Post status</button>
  </div>

  <section id="tab-overview" class="tab active"><div id="overview"></div></section>
  <section id="tab-adapters" class="tab">
    <div class="row" style="margin-bottom:16px">
      <div class="card">
        <h3>Создать инстанс адаптера</h3>
        <div class="row3">
          <label><span class="label">Тип адаптера</span><select id="newAdapterKey"></select></label>
          <label><span class="label">ID инстанса</span><input id="newInstanceId" placeholder="telegram-main"></label>
          <label><span class="label">Название</span><input id="newDisplayName" placeholder="Telegram main"></label>
        </div>
        <div class="inline"><button class="btn" id="createInstanceBtn">Создать</button><span class="muted">После сохранения конфигурации нужен restart приложения для runtime-подключения.</span></div>
      </div>
    </div>
    <div id="adapterInstances"></div>
  </section>
  <section id="tab-matrix" class="tab"><div class="card"><h3>Матрица платформ</h3><div id="matrix"></div></div></section>
  <section id="tab-routes" class="tab">
    <div class="card">
      <h3>Маршрут между инстансами</h3>
      <form id="routeForm">
        <div class="row3">
          <label><span class="label">Route ID</span><input name="id" required></label>
          <label><span class="label">Source adapter</span><select name="source_adapter_id"></select></label>
          <label><span class="label">Source chat id</span><input name="source_chat_id" required></label>
          <label><span class="label">Target adapter</span><select name="target_adapter_id"></select></label>
          <label><span class="label">Target chat id</span><input name="target_chat_id" required></label>
          <label><span class="label">Enabled</span><select name="enabled"><option value="true">true</option><option value="false">false</option></select></label>
        </div>
        <div class="inline" style="margin-top:8px"><button class="btn" type="submit">Сохранить маршрут</button><button class="btn secondary" type="button" id="routeDeleteBtn">Удалить по id</button></div>
      </form>
    </div>
    <div class="card" style="margin-top:16px"><div id="routes"></div></div>
  </section>
  <section id="tab-jobs" class="tab"><div class="card"><div id="jobs"></div></div></section>
  <section id="tab-links" class="tab"><div class="card"><div id="links"></div></div></section>
</div>
<div id="toast" class="toast hidden"></div>
<script>
const state={defs:[],instances:[],overview:{},rules:[],routes:[],jobs:[],links:[]};
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function api(url, opts={}){const r=await fetch(url,{headers:{'content-type':'application/json'},...opts}); if(!r.ok) throw new Error(await r.text()); return r.headers.get('content-type')?.includes('json')?r.json():r.text()}
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.remove('hidden');setTimeout(()=>el.classList.add('hidden'),3000)}
$$('.tabs button').forEach(b=>b.onclick=()=>{$$('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); $$('.tab').forEach(x=>x.classList.remove('active')); $('#tab-'+b.dataset.tab).classList.add('active')})
function bool(v){return String(v)==='true'}
function listStr(v){return String(v||'').split(',').map(x=>x.trim()).filter(Boolean)}
function valueFromField(field, raw){ if(field.field_type==='bool') return bool(raw); if(field.field_type==='int') return raw===''?null:Number(raw); if(field.field_type==='float') return raw===''?null:Number(raw); if(field.field_type==='list_str') return listStr(raw); return raw===''?null:String(raw)}
function fieldInput(field, value, secretPresent=false){ const val=value??field.default??''; const attrs=`data-name="${field.name}" data-type="${field.field_type}" ${field.secret?'data-secret="1"':''}`; if(field.field_type==='bool'){return `<select ${attrs}><option value="true" ${val!==false?'selected':''}>true</option><option value="false" ${val===false?'selected':''}>false</option></select>`}
  if(field.field_type==='choice'){return `<select ${attrs}>${(field.options||[]).map(o=>`<option value="${esc(o.value)}" ${o.value===val?'selected':''}>${esc(o.label)}</option>`).join('')}</select>`}
  if(field.field_type==='list_str'){return `<input ${attrs} value="${esc((val||[]).join(', '))}" placeholder="id1, id2">`}
  if(field.secret){return `<input ${attrs} type="password" placeholder="${secretPresent?'Оставь пустым чтобы не менять':'Введите значение'}">`}
  return `<input ${attrs} value="${esc(val)}">`; }
function isFieldVisible(values, rule){
  if(!rule) return true;
  if(rule.all) return rule.all.every(child => isFieldVisible(values, child));
  if(rule.any) return rule.any.some(child => isFieldVisible(values, child));
  if(!rule.field) return true;
  const value = values[rule.field];
  if(rule.eq !== undefined && rule.eq !== null && value !== rule.eq) return false;
  if(rule.ne !== undefined && rule.ne !== null && value === rule.ne) return false;
  if(Array.isArray(rule.in) && !rule.in.includes(value)) return false;
  if(Array.isArray(rule.not_in) && rule.not_in.includes(value)) return false;
  if(rule.is_true === true && value !== true) return false;
  if(rule.is_false === true && value !== false) return false;
  if(rule.is_none === true && value !== null && value !== undefined && value !== '') return false;
  if(rule.is_not_none === true && (value === null || value === undefined || value === '')) return false;
  return true;
}
function collectFormValues(form, def){
  const values = {};
  for(const field of (def.fields || [])){
    const el = form.querySelector(`[data-name="${field.name}"]`);
    if(!el) continue;
    values[field.name] = valueFromField(field, el.value);
  }
  return values;
}
function updateFieldVisibility(form, def){
  const values = collectFormValues(form, def);
  for(const field of (def.fields || [])){
    const wrapper = form.querySelector(`[data-field-wrapper="1"][data-field-name="${field.name}"]`);
    if(!wrapper) continue;
    const visible = isFieldVisible(values, field.visible_when);
    wrapper.classList.toggle('hidden', !visible);
  }
}
function buildDiagnostics(){
  const o = state.overview || {};
  const diagnostics = [];
  if ((o.rules_total || 0) === 0) diagnostics.push('No rules configured');
  if ((o.routes_total || 0) > 0 && (o.rules_total || 0) === 0) diagnostics.push('Route exists but no matching rule');
  const disabledUpdates = (state.instances || []).filter(x => x.enabled && x.config && x.config.receive_updates === false);
  if (disabledUpdates.length) diagnostics.push('Adapter receives no updates: ' + disabledUpdates.map(x => x.id).join(', '));
  if ((o.jobs_total || 0) === 0) diagnostics.push('Delivery queue is idle');
  return diagnostics;
}
function renderOverview(){ const o=state.overview||{}; const diagnostics = buildDiagnostics(); $('#overview').innerHTML=`<div class="grid"><div class="card"><h3>Сводка</h3><div class="muted">adapter instances: ${o.adapter_instances_total||0}</div><div class="muted">routes: ${o.routes_total||0}</div><div class="muted">rules: ${o.rules_total||0}</div><div class="muted">jobs: ${o.jobs_total||0}</div><div class="muted">links: ${o.links_total||0}</div></div><div class="card"><h3>Runtime adapters</h3>${(o.adapter_runtime_instances||[]).map(x=>`<div class="mono">${esc(x.instance_id)} <span class="pill">${esc(x.platform)}</span></div>`).join('')||'<div class="muted">пока нет</div>'}</div><div class="card"><h3>Jobs by status</h3>${Object.entries(o.jobs_by_status||{}).map(([k,v])=>`<div>${esc(k)}: ${v}</div>`).join('')||'<div class="muted">пусто</div>'}</div><div class="card"><h3>Диагностика</h3>${diagnostics.length ? diagnostics.map(x=>`<div class="muted">${esc(x)}</div>`).join('') : '<div class="muted">Явных проблем не найдено</div>'}</div></div>` }
function renderDefinitionsSelect(){ $('#newAdapterKey').innerHTML=state.defs.map(d=>`<option value="${esc(d.adapter_key)}">${esc(d.title)}</option>`).join('') }
function buildInstanceCard(instance){ const def=state.defs.find(d=>d.adapter_key===instance.adapter_key); if(!def) return ''; const cfg=instance.config||{}; const present=instance.secret_fields_present||{};
 const simple=def.fields.filter(f=>f.scope==='simple'); const adv=def.fields.filter(f=>f.scope==='advanced');
 const renderFields=(fields)=>fields.map(f=>`<label data-field-wrapper="1" data-field-name="${esc(f.name)}"><span class="label">${esc(f.label)}</span>${fieldInput(f, cfg[f.name], !!present[f.name])}<div class="muted">${esc(f.help_text||'')}</div></label>`).join('');
 return `<div class="card"><div class="inline" style="justify-content:space-between"><div><h3>${esc(instance.display_name)}</h3><div class="muted mono">${esc(instance.id)} · ${esc(instance.adapter_key)} · ${esc(instance.platform)}</div></div><div class="inline"><span class="pill">${instance.enabled?'enabled':'disabled'}</span><button class="btn secondary toggle-advanced" data-id="${esc(instance.id)}">advanced</button><button class="btn danger delete-instance" data-id="${esc(instance.id)}">delete</button></div></div><form class="instance-form" data-id="${esc(instance.id)}" data-adapter-key="${esc(instance.adapter_key)}"><div class="row3">${renderFields(simple)}</div><div class="advanced hidden" id="adv-${esc(instance.id)}"><div class="row3">${renderFields(adv)}</div></div><div class="inline"><button class="btn" type="submit">Сохранить</button><span class="muted">Секретные поля можно оставлять пустыми — старое значение сохранится.</span></div></form></div>` }
function renderInstances(){ $('#adapterInstances').innerHTML=(state.instances||[]).map(buildInstanceCard).join('')||'<div class="card"><div class="muted">Инстансов пока нет</div></div>'; $$('.toggle-advanced').forEach(b=>b.onclick=()=>$('#adv-'+b.dataset.id).classList.toggle('hidden')); $$('.delete-instance').forEach(b=>b.onclick=async()=>{await api('/api/adapter-instances/'+encodeURIComponent(b.dataset.id),{method:'DELETE'}); toast('Инстанс удалён'); await refreshAll()}); $$('.instance-form').forEach(f=>{ const def=state.defs.find(x=>x.adapter_key===f.dataset.adapterKey); const reeval=()=>updateFieldVisibility(f, def); f.onchange=reeval; f.oninput=reeval; reeval(); f.onsubmit=saveInstanceForm }) }
async function saveInstanceForm(e){ e.preventDefault(); const form=e.currentTarget; const id=form.dataset.id; const adapter_key=form.dataset.adapterKey; const instance=state.instances.find(x=>x.id===id); const def=state.defs.find(x=>x.adapter_key===adapter_key); const config={}, secrets={}; for(const field of def.fields){ const el=form.querySelector(`[data-name="${field.name}"]`); if(!el) continue; const value=valueFromField(field, el.value); if(field.secret){ if(el.value.trim()!=='') secrets[field.name]=value; } else { if(field.name==='display_name') continue; if(field.name==='enabled') continue; config[field.name]=value; } }
 await api('/api/adapter-instances',{method:'POST', body:JSON.stringify({id,adapter_key,display_name:form.querySelector('[data-name="display_name"]').value||instance.display_name,enabled:bool(form.querySelector('[data-name="enabled"]').value),config,secrets})}); toast('Сохранено. Для runtime нужен restart.'); await refreshAll() }
async function createInstance(){ const adapter_key=$('#newAdapterKey').value; const id=$('#newInstanceId').value.trim(); const display_name=$('#newDisplayName').value.trim()||id; if(!id) return toast('Нужен id'); await api('/api/adapter-instances',{method:'POST', body:JSON.stringify({id,adapter_key,display_name,enabled:true,config:{},secrets:{}})}); toast('Инстанс создан'); $('#newInstanceId').value=''; $('#newDisplayName').value=''; await refreshAll() }
function renderMatrix(){ $('#matrix').innerHTML='<table><thead><tr><th>from</th><th>to</th><th>enabled</th><th>content</th></tr></thead><tbody>'+(state.rules||[]).map(r=>`<tr><td>${esc(r.source_platform)}</td><td>${esc(r.target_platform)}</td><td>${esc(r.enabled)}</td><td class="mono">text:${r.content_policy.allow_text} img:${r.content_policy.allow_images} video:${r.content_policy.allow_video} audio:${r.content_policy.allow_audio} repost:${r.content_policy.allow_reposts}</td></tr>`).join('')+'</tbody></table>' }
function fillRouteOptions(){ const opts=(state.instances||[]).map(x=>`<option value="${esc(x.id)}">${esc(x.display_name)} (${esc(x.id)})</option>`).join(''); $('[name="source_adapter_id"]').innerHTML=opts; $('[name="target_adapter_id"]').innerHTML=opts }
async function saveRoute(e){ e.preventDefault(); const f=e.currentTarget; const src=state.instances.find(x=>x.id===f.source_adapter_id.value); const dst=state.instances.find(x=>x.id===f.target_adapter_id.value); await api('/routes',{method:'POST', body:JSON.stringify({id:f.id.value,source_adapter_id:f.source_adapter_id.value,source_platform:src.platform,source_chat_id:f.source_chat_id.value,target_adapter_id:f.target_adapter_id.value,target_platform:dst.platform,target_chat_id:f.target_chat_id.value,enabled:bool(f.enabled.value)})}); toast('Route saved'); await refreshAll() }
function renderRoutes(){ $('#routes').innerHTML='<table><thead><tr><th>id</th><th>source</th><th>target</th><th>enabled</th></tr></thead><tbody>'+(state.routes||[]).map(r=>`<tr><td>${esc(r.id)}</td><td>${esc(r.source_adapter_id)} / <span class="mono">${esc(r.source_chat_id)}</span></td><td>${esc(r.target_adapter_id)} / <span class="mono">${esc(r.target_chat_id)}</span></td><td>${esc(r.enabled)}</td></tr>`).join('')+'</tbody></table>' }
function renderJobs(){ $('#jobs').innerHTML='<table><thead><tr><th>id</th><th>status</th><th>target</th><th>origin</th><th>attempts</th><th>error</th><th></th></tr></thead><tbody>'+(state.jobs||[]).map(j=>`<tr><td>${j.id}</td><td>${esc(j.status)}</td><td>${esc(j.target_adapter_id||j.target_platform)} / <span class="mono">${esc(j.target_chat_id)}</span></td><td>${esc(j.origin_adapter_id||j.origin_platform)} / <span class="mono">${esc(j.origin_chat_id)}:${esc(j.origin_message_id)}</span></td><td>${j.attempts}/${j.max_attempts}</td><td class="mono">${esc(j.last_error||'')}</td><td>${['dead_letter','retrying'].includes(j.status)?`<button class="btn secondary" onclick="requeueJob(${j.id})">requeue</button>`:''}</td></tr>`).join('')+'</tbody></table>' }
function renderLinks(){ $('#links').innerHTML='<table><thead><tr><th>origin</th><th>target</th><th>created</th></tr></thead><tbody>'+(state.links||[]).map(l=>`<tr><td>${esc(l.origin_adapter_id||l.origin_platform)} / <span class="mono">${esc(l.origin_chat_id)}:${esc(l.origin_message_id)}</span></td><td>${esc(l.target_adapter_id||l.target_platform)} / <span class="mono">${esc(l.target_chat_id)}:${esc(l.target_message_id)}</span></td><td>${esc(l.created_at||'')}</td></tr>`).join('')+'</tbody></table>' }
async function requeueJob(id){ await api('/api/dashboard/jobs/'+id+'/requeue',{method:'POST'}); toast('Job requeued'); await refreshJobs() }
async function refreshAll(){ state.defs=await api('/api/adapter-definitions'); state.instances=await api('/api/adapter-instances'); state.overview=await api('/api/dashboard/overview'); state.rules=await api('/api/dashboard/rules'); state.routes=await api('/api/dashboard/routes'); state.jobs=await api('/api/dashboard/jobs'); state.links=await api('/api/dashboard/message-links'); renderDefinitionsSelect(); renderOverview(); renderInstances(); renderMatrix(); fillRouteOptions(); renderRoutes(); renderJobs(); renderLinks(); }
$('#createInstanceBtn').onclick=createInstance; $('#routeForm').onsubmit=saveRoute; $('#routeDeleteBtn').onclick=async()=>{const id=$('#routeForm [name="id"]').value; if(!id) return; await api('/routes/'+encodeURIComponent(id),{method:'DELETE'}); toast('Route deleted'); await refreshAll()}; refreshAll().catch(e=>toast(e.message));
</script>
</body>
</html>
