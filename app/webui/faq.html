<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FAQ / Где что взять — AutoPost Sync</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="shortcut icon" href="/static/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <style>
    body{font-family:system-ui,sans-serif;margin:0;background:#0f172a;color:#e2e8f0}
    .wrap{max-width:1100px;margin:0 auto;padding:24px}
    .grid{display:grid;grid-template-columns:280px 1fr;gap:20px}
    .card{background:#111827;border:1px solid #334155;border-radius:14px;padding:16px}
    input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #475569;background:#020617;color:#e2e8f0}
    a{color:#93c5fd;text-decoration:none}.entry{margin-bottom:16px}.tag{display:inline-block;padding:2px 8px;border-radius:999px;background:#1e293b;font-size:12px;margin-right:6px}.muted{color:#94a3b8}
    h1,h2,h3{margin:0 0 12px}.entry h3{margin-bottom:6px}.md p,.md li{line-height:1.5;color:#cbd5e1}.md ul{padding-left:18px}
  </style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <div>
      <h1>FAQ / Где что взять</h1>
      <div class="muted">Справка собирается автоматически из help-метаданных адаптеров и полей.</div>
    </div>
    <a href="/">← Вернуться в приложение</a>
  </div>
  <div class="grid">
    <div class="card">
      <label><span class="muted">Поиск</span><input id="q" placeholder="Например: VK Group ID"></label>
      <label style="margin-top:12px"><span class="muted">Адаптер</span><select id="adapter"><option value="">Все</option></select></label>
    </div>
    <div id="entries"></div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s); const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
let entries=[];
function mdToHtml(md){return String(md||'').split(/\n\n+/).map(block=>{if(block.startsWith('### ')) return `<h3>${esc(block.slice(4))}</h3>`; if(block.startsWith('## ')) return `<h2>${esc(block.slice(3))}</h2>`; if(block.startsWith('# ')) return `<h1>${esc(block.slice(2))}</h1>`; if(block.split('\n').every(line=>line.trim().startsWith('- '))) return `<ul>${block.split('\n').map(line=>`<li>${esc(line.trim().slice(2))}</li>`).join('')}</ul>`; return `<p>${esc(block).replace(/\n/g,'<br>')}</p>`;}).join('');}
function render(){ const q=$('#q').value.trim().toLowerCase(); const adapter=$('#adapter').value; const filtered=entries.filter(e=>{ if(adapter && e.adapter_key!==adapter) return false; const blob=(e.title+' '+e.summary+' '+e.body_markdown+' '+(e.tags||[]).join(' ')).toLowerCase(); return !q || blob.includes(q);}); $('#entries').innerHTML=filtered.map(e=>`<div class="card entry"><div class="muted">${e.adapter_key?`адаптер: <span class="tag">${esc(e.adapter_key)}</span>`:''}${(e.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div><h3>${esc(e.title)}</h3><div class="muted" style="margin-bottom:10px">${esc(e.summary||'')}</div><div class="md">${mdToHtml(e.body_markdown||'')}</div></div>`).join('')||'<div class="card">Ничего не найдено</div>'; }
async function init(){ const payload=await fetch('/api/help/entries').then(r=>r.json()); entries=payload.entries||[]; const adapters=[...new Set(entries.map(x=>x.adapter_key).filter(Boolean))].sort(); $('#adapter').innerHTML='<option value="">Все</option>'+adapters.map(a=>`<option value="${esc(a)}">${esc(a)}</option>`).join(''); $('#q').oninput=render; $('#adapter').onchange=render; render(); }
init();
</script>
</body>
</html>
